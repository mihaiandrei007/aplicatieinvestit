name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + teste + build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: investpals
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/investpals?schema=public
      JWT_SECRET: ci-secret-not-for-prod
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Teste unitare
        run: npm test
      - name: Build
        run: npm run build
      - name: Migrări
        run: npx prisma migrate deploy
      - name: Teste de integrare
        run: npm run test:integration

  mobile:
    name: Mobil (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
