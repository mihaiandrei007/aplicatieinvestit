# Blueprint Render: backend InvestPals + PostgreSQL.
# Deploy: push pe GitHub → render.com → New → Blueprint → alege repo-ul.
databases:
  - name: investpals-db
    plan: free

services:
  - type: web
    name: investpals-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investpals-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Your account email gets in-app admin access. Set this value in the
      # Render dashboard (kept out of the repo).
      - key: OWNER_EMAIL
        sync: false
      # Secret password for the web /admin page (open /admin?key=...).
      # Pick your own value in the Render dashboard (kept out of the repo).
      - key: ADMIN_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      # Piață live: avansează prețurile + generează știri la fiecare 15s.
      - key: MARKET_TICK_MS
        value: "15000"
